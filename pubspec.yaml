name: compliance_reporter
description: >
  Production-grade Dart package for generating compliance audit reports in PDF and Excel. Includes access logs, activity tracking, anomaly detection, risk scoring, and support for GDPR, SOC 2, ISO 27001, PCI-DSS, and HIPAA. Works on Flutter and standalone Dart backends.


version: 1.0.0
repository: https://github.com/Brah-Timo/compliance_reporter
issue_tracker: https://github.com/Brah-Timo/compliance_reporter/issues


topics:
  - compliance
  - audit
  - pdf
  - excel
  - security


environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  # PDF generation
  pdf: ^3.11.1
  printing: ^5.13.1

  # Excel generation
  excel: ^4.0.6

  # Internationalization & date formatting
  intl: ^0.19.0

  # UUID generation for report IDs
  uuid: ^4.4.2

  # Cryptographic hashing & digital signatures
  crypto: ^3.0.3
  pointycastle: ^3.9.1

  # HTTP client for remote log collectors
  http: ^1.2.2

  # JSON serialization
  json_annotation: ^4.9.0

  # Archive / compression
  archive: ^3.6.1

  # Path utilities
  path: ^1.9.0

  # Logging
  logging: ^1.2.0

dev_dependencies:
  test: ^1.25.2
  mockito: ^5.4.4
  build_runner: ^2.4.11
  json_serializable: ^6.8.0
  lints: ^4.0.0
  coverage: ^1.9.2
  fake_async: ^1.3.1
